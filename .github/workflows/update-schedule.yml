name: Update Schedule Data

on:
  schedule:
    # Every 2 hours — catches newly finished matches
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        run: node scripts/update-static-data.cjs

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: update match scores & goals from API'
          file_pattern: 'src/data/venue-schedule.json'
